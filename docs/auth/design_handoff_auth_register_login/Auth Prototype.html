<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auth — Register &amp; Login Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Unbounded:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink: #FF2E7E;
    --pink-deep: #E11D6B;
    --yellow: #FFDD2D;
    --ink: #1A1208;
    --paper: #FFFBF2;
    --paper-2: #FFF4DE;
    --line: #1A1208;
    --radius: 22px;
    --radius-sm: 14px;
    --display: "Bricolage Grotesque", system-ui, sans-serif;
    --body: "Hanken Grotesk", system-ui, sans-serif;
    --shadow: 8px 8px 0 var(--ink);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--body);
    background:
      radial-gradient(circle at 12% 18%, color-mix(in srgb, var(--yellow) 55%, transparent) 0, transparent 42%),
      radial-gradient(circle at 88% 84%, color-mix(in srgb, var(--pink) 38%, transparent) 0, transparent 46%),
      var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px;
  }

  ::selection { background: var(--pink); color: #fff; }

  #root { width: 100%; max-width: 1040px; }

  /* ----- Card shell ----- */
  .card {
    display: grid;
    grid-template-columns: 0.92fr 1fr;
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 600px;
  }

  /* ----- Brand panel ----- */
  .brand {
    position: relative;
    background: var(--pink);
    color: #fff;
    padding: 40px 38px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    border-right: 3px solid var(--ink);
  }
  .brand__shape {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .brand__shape--y {
    width: 220px; height: 220px;
    background: var(--yellow);
    right: -70px; top: -70px;
    border: 3px solid var(--ink);
  }
  .brand__shape--ring {
    width: 150px; height: 150px;
    background: transparent;
    border: 16px solid color-mix(in srgb, #fff 18%, transparent);
    left: -58px; top: 168px;
  }
  .brand__shape--dot {
    width: 16px; height: 16px;
    background: var(--ink);
    left: 116px; top: 250px;
  }
  .brand__kicker {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: var(--body);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--yellow);
    padding: 7px 13px;
    border-radius: 100px;
    width: fit-content;
  }
  .brand__kicker b { width: 7px; height: 7px; border-radius: 50%; background: var(--yellow); display: inline-block; }
  .brand__title {
    position: relative;
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(38px, 5vw, 60px);
    line-height: 0.92;
    letter-spacing: -0.02em;
    margin: 24px 0 0;
    text-wrap: balance;
  }
  .brand__title em {
    font-style: normal;
    background: var(--yellow);
    color: var(--ink);
    padding: 0 10px;
    border-radius: 8px;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  .brand__sub {
    position: relative;
    font-size: 15.5px;
    line-height: 1.5;
    max-width: 30ch;
    margin-top: 18px;
    color: color-mix(in srgb, #fff 92%, transparent);
  }
  .brand__foot {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 28px;
  }
  .brand__rule {
    display: flex;
    align-items: center;
    gap: 11px;
    font-size: 13.5px;
    line-height: 1.25;
    font-weight: 500;
  }
  .brand__rule .txt { flex: 1 1 auto; min-width: 0; }
  .brand__rule span.num {
    flex: none;
    width: 26px; height: 26px;
    display: grid; place-items: center;
    background: var(--yellow);
    color: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 50%;
    font-family: var(--display);
    font-weight: 800;
    font-size: 13px;
  }

  /* ----- Form panel ----- */
  .panel { padding: 38px 40px 34px; display: flex; flex-direction: column; }

  .tabs {
    display: inline-flex;
    gap: 4px;
    background: var(--paper-2);
    border: 2.5px solid var(--ink);
    border-radius: 100px;
    padding: 4px;
    width: fit-content;
    align-self: flex-start;
  }
  .tab {
    font-family: var(--body);
    font-weight: 700;
    font-size: 14px;
    border: none;
    background: transparent;
    color: var(--ink);
    padding: 9px 20px;
    border-radius: 100px;
    white-space: nowrap;
    cursor: pointer;
    transition: background .14s ease, color .14s ease;
  }
  .tab[aria-selected="true"] { background: var(--ink); color: var(--yellow); }
  .tab:not([aria-selected="true"]):hover { background: color-mix(in srgb, var(--yellow) 60%, transparent); }

  .panel__head { margin: 26px 0 20px; }
  .panel__title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 30px;
    line-height: 1.02;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .panel__lead { margin: 7px 0 0; font-size: 14.5px; color: color-mix(in srgb, var(--ink) 68%, transparent); }

  form { display: flex; flex-direction: column; gap: 14px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field > label {
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .field .hint { font-weight: 500; color: color-mix(in srgb, var(--ink) 50%, transparent); font-size: 11.5px; }
  .field input {
    font-family: var(--body);
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    background: #fff;
    border: 2.5px solid var(--ink);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    width: 100%;
    transition: box-shadow .12s ease, border-color .12s ease, background .12s ease;
  }
  .field input::placeholder { color: color-mix(in srgb, var(--ink) 38%, transparent); font-weight: 500; }
  .field input:focus { outline: none; box-shadow: 4px 4px 0 var(--pink); }
  .field--bad input { border-color: var(--pink-deep); background: color-mix(in srgb, var(--pink) 8%, #fff); }
  .field__err {
    font-size: 12px;
    font-weight: 600;
    color: var(--pink-deep);
    display: flex;
    align-items: center;
    gap: 5px;
    min-height: 0;
  }
  .field__err::before { content: "▲"; font-size: 9px; }

  .pw-wrap { position: relative; display: flex; }
  .pw-wrap input { padding-right: 58px; }
  .pw-toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    border: none; background: var(--paper-2);
    font-family: var(--body); font-weight: 700; font-size: 11px; letter-spacing: .04em;
    text-transform: uppercase; color: var(--ink);
    padding: 7px 9px; border-radius: 9px; cursor: pointer;
  }
  .pw-toggle:hover { background: var(--yellow); }

  .submit {
    margin-top: 6px;
    font-family: var(--display);
    font-weight: 800;
    font-size: 17px;
    color: var(--ink);
    background: var(--yellow);
    border: 3px solid var(--ink);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform .1s ease, box-shadow .1s ease;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .submit:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--ink); }
  .submit:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .submit__arrow { font-family: var(--body); }

  .formflash {
    display: flex; align-items: center; gap: 9px;
    font-size: 13.5px; font-weight: 600;
    padding: 11px 13px;
    border-radius: var(--radius-sm);
    border: 2.5px solid var(--ink);
  }
  .formflash--err { background: color-mix(in srgb, var(--pink) 14%, #fff); color: var(--pink-deep); }
  .formflash b { flex: none; width: 18px; height: 18px; border-radius: 50%; background: var(--pink-deep); color: #fff; display: grid; place-items: center; font-size: 12px; font-family: var(--display); }

  .swap { font-size: 13.5px; margin-top: 16px; color: color-mix(in srgb, var(--ink) 70%, transparent); }
  .swap button { background: none; border: none; font-family: var(--body); font-weight: 800; color: var(--pink-deep); cursor: pointer; padding: 0; font-size: 13.5px; text-decoration: underline; text-underline-offset: 3px; }

  /* ----- Success ----- */
  .success { display: flex; flex-direction: column; height: 100%; justify-content: center; }
  .success__badge {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--yellow); border: 3px solid var(--ink);
    display: grid; place-items: center;
    font-family: var(--display); font-weight: 800; font-size: 32px;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 22px;
  }
  .success__title { font-family: var(--display); font-weight: 800; font-size: 34px; letter-spacing: -0.02em; margin: 0; line-height: 1; }
  .success__name { color: var(--pink-deep); }
  .success__lead { font-size: 15px; color: color-mix(in srgb, var(--ink) 70%, transparent); margin: 12px 0 24px; max-width: 34ch; line-height: 1.5; }
  .success__meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
  .chip {
    font-size: 12.5px; font-weight: 600;
    background: var(--paper-2); border: 2px solid var(--ink);
    border-radius: 100px; padding: 6px 13px;
  }
  .chip b { color: color-mix(in srgb, var(--ink) 55%, transparent); font-weight: 700; margin-right: 5px; text-transform: uppercase; font-size: 10.5px; letter-spacing: .05em; }
  .ghostbtn {
    align-self: flex-start;
    font-family: var(--body); font-weight: 700; font-size: 14px;
    background: #fff; color: var(--ink);
    border: 2.5px solid var(--ink); border-radius: var(--radius-sm);
    padding: 11px 18px; cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .1s, box-shadow .1s;
  }
  .ghostbtn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .ghostbtn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }

  /* ----- Inspector drawer ----- */
  .inspector-toggle {
    position: fixed; right: 18px; bottom: 18px; z-index: 40;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--body); font-weight: 700; font-size: 13px;
    background: var(--ink); color: var(--yellow);
    border: 2.5px solid var(--ink); border-radius: 100px;
    padding: 10px 16px; cursor: pointer;
    box-shadow: var(--shadow);
  }
  .inspector-toggle:hover { background: #000; }
  .inspector-toggle b { background: var(--pink); color: #fff; border-radius: 100px; padding: 1px 8px; font-size: 12px; }

  .drawer-scrim { position: fixed; inset: 0; background: color-mix(in srgb, var(--ink) 38%, transparent); z-index: 50; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(440px, 92vw); z-index: 51;
    background: var(--paper); border-left: 3px solid var(--ink);
    box-shadow: -10px 0 0 rgba(0,0,0,.06);
    display: flex; flex-direction: column;
  }
  .drawer__head { padding: 22px 24px; border-bottom: 3px solid var(--ink); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .drawer__head h3 { font-family: var(--display); font-weight: 800; font-size: 21px; margin: 0; letter-spacing: -.01em; }
  .drawer__head p { margin: 6px 0 0; font-size: 12.5px; color: color-mix(in srgb, var(--ink) 62%, transparent); line-height: 1.45; }
  .drawer__x { flex: none; border: 2.5px solid var(--ink); background: #fff; width: 34px; height: 34px; border-radius: 10px; font-size: 18px; cursor: pointer; line-height: 1; }
  .drawer__x:hover { background: var(--yellow); }
  .drawer__body { padding: 18px 20px; overflow: auto; flex: 1; }
  .acct {
    border: 2.5px solid var(--ink); border-radius: var(--radius-sm);
    padding: 14px; margin-bottom: 14px; background: #fff;
  }
  .acct__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .acct__login { font-family: var(--display); font-weight: 800; font-size: 17px; }
  .acct__tag { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; background: var(--yellow); border: 2px solid var(--ink); border-radius: 100px; padding: 3px 9px; }
  .kv { font-family: "Space Mono", monospace; font-size: 12px; line-height: 1.65; word-break: break-all; }
  .kv .k { color: color-mix(in srgb, var(--ink) 55%, transparent); }
  .kv .secure { color: #137a4b; }
  .kv .plain { color: var(--pink-deep); }
  .empty { text-align: center; padding: 38px 16px; color: color-mix(in srgb, var(--ink) 55%, transparent); font-size: 14px; }
  .empty b { display: block; font-family: var(--display); font-size: 18px; color: var(--ink); margin-bottom: 6px; }
  .drawer__foot { padding: 16px 20px; border-top: 3px solid var(--ink); display: flex; gap: 10px; }
  .drawer__foot button { flex: 1; font-family: var(--body); font-weight: 700; font-size: 13px; border: 2.5px solid var(--ink); border-radius: 10px; padding: 10px; cursor: pointer; background: #fff; }
  .drawer__foot button:hover { background: var(--paper-2); }
  .drawer__foot .danger { background: var(--pink); color: #fff; }
  .drawer__foot .danger:hover { background: var(--pink-deep); }

  @media (max-width: 860px) {
    body { padding: 16px; }
    .card { grid-template-columns: 1fr; min-height: 0; }
    .brand { border-right: none; border-bottom: 3px solid var(--ink); min-height: 240px; }
    .panel { padding: 28px 24px 30px; }
  }

  [data-corner="sharp"] { --radius: 4px; --radius-sm: 3px; }
  [data-corner="sharp"] .brand__shape--y, [data-corner="sharp"] .success__badge, [data-corner="sharp"] .brand__rule span, [data-corner="sharp"] .acct__tag, [data-corner="sharp"] .chip { border-radius: 4px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
